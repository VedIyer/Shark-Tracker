<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦈 Shark Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#0f172a}
header{background:#0f172a;color:white;padding:11px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid #1e293b}
header h1{font-size:15px;font-weight:600;letter-spacing:.3px}
header p{font-size:11px;color:#475569;margin-top:1px}
.live{background:#0ea5e9;color:white;font-size:9px;padding:2px 6px;border-radius:99px;margin-left:6px;letter-spacing:.5px;text-transform:uppercase}
#layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:260px;min-width:260px;background:#0f172a;border-right:1px solid #1e293b;display:flex;flex-direction:column;overflow:hidden}
#search-wrap{padding:10px 12px;border-bottom:1px solid #1e293b}
#search-wrap input{width:100%;padding:7px 10px;border:1px solid #1e293b;border-radius:7px;font-size:13px;outline:none;background:#1e293b;color:white}
#search-wrap input::placeholder{color:#475569}
#search-wrap input:focus{border-color:#0ea5e9}
#filters{padding:8px 12px;border-bottom:1px solid #1e293b;display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid #1e293b;background:transparent;color:#64748b;cursor:pointer}
.pill.on{background:#0ea5e9;color:white;border-color:#0ea5e9}
#count{padding:5px 14px;font-size:11px;color:#334155;border-bottom:1px solid #1e293b}
#list{flex:1;overflow-y:auto}
#list::-webkit-scrollbar{width:4px}
#list::-webkit-scrollbar-track{background:#0f172a}
#list::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.row{padding:10px 14px;border-bottom:1px solid #1e293b;cursor:pointer;display:flex;align-items:center;gap:10px}
.row:hover{background:#1e293b}
.row.sel{background:#0c1a2e;border-left:3px solid #0ea5e9}
.av{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:#1e293b}
.ri{flex:1;min-width:0}
.rn{font-size:13px;font-weight:600;color:#e2e8f0}
.rs{font-size:11px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#map{flex:1}
.leaflet-container{background:#a8c8e8}
.leaflet-control-zoom a{background:#1e293b!important;color:#94a3b8!important;border-color:#334155!important}
.leaflet-control-zoom a:hover{background:#334155!important;color:white!important}
.leaflet-control-layers{background:#1e293b!important;color:#e2e8f0!important;border:1px solid #334155!important;border-radius:8px!important}
.leaflet-control-layers label{color:#cbd5e1!important}
.leaflet-control-attribution{background:rgba(15,23,42,.7)!important;color:#334155!important;font-size:9px!important}
.leaflet-control-attribution a{color:#475569!important}

/* Detail panel */
#detail{position:fixed;top:58px;right:14px;width:230px;background:#0f172a;border-radius:12px;border:1px solid #1e293b;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;max-height:calc(100vh - 72px);overflow-y:auto;z-index:1000}
#detail h3{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:10px;line-height:1.3;padding-right:20px}
.dr{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;gap:8px}
.dl{color:#475569;flex-shrink:0}.dv{color:#cbd5e1;font-weight:500;text-align:right}
#trail-status{margin-top:8px;font-size:11px;color:#475569;padding:6px 8px;background:#1e293b;border-radius:6px;line-height:1.5}
#detail img{width:100%;border-radius:6px;margin-top:10px;display:none;opacity:.9}
#close-btn{position:absolute;top:10px;right:10px;background:none;border:none;font-size:14px;cursor:pointer;color:#475569;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px}
#close-btn:hover{background:#1e293b;color:#e2e8f0}

/* Playback controls */
#playback{margin-top:10px;border-top:1px solid #1e293b;padding-top:10px;display:none}
#playback-btns{display:flex;gap:6px;margin-bottom:8px}
#play-btn{flex:1;padding:6px;background:#0ea5e9;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
#play-btn:hover{background:#0284c7}
#play-btn:disabled{background:#1e293b;color:#475569;cursor:default}
#reset-btn{padding:6px 10px;background:#1e293b;color:#94a3b8;border:none;border-radius:6px;cursor:pointer;font-size:12px}
#reset-btn:hover{background:#334155;color:white}
#speed-wrap{display:flex;align-items:center;gap:6px;margin-bottom:8px}
#speed-wrap label{font-size:10px;color:#475569;flex-shrink:0}
#speed{flex:1;accent-color:#0ea5e9}
#progress-wrap{display:flex;align-items:center;gap:6px}
#progress-wrap label{font-size:10px;color:#475569;flex-shrink:0}
#progress{flex:1;accent-color:#0ea5e9;cursor:pointer}
#ping-info{margin-top:6px;font-size:10px;color:#64748b;text-align:center;min-height:14px;font-family:monospace}


/* Shark of the Day */
#sotd{margin:10px 12px;padding:0;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #1e293b;background:linear-gradient(135deg,#0c4a6e,#075985);position:relative;transition:transform .15s}
#sotd:hover{transform:translateY(-1px);border-color:#0ea5e9}
#sotd-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#7dd3fc;padding:8px 12px 0}
#sotd-body{display:flex;align-items:center;gap:10px;padding:6px 12px 10px}
#sotd-emoji{font-size:28px;flex-shrink:0}
#sotd-info{flex:1;min-width:0}
#sotd-name{font-size:15px;font-weight:700;color:white}
#sotd-meta{font-size:10px;color:#bae6fd;margin-top:1px}
#sotd-ping{font-size:9px;color:#7dd3fc;margin-top:3px}
#sotd-img{width:100%;height:70px;object-fit:cover;display:block;opacity:.85}


/* View toggle */
#view-toggle{background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
#view-toggle:hover{background:#334155;color:white;border-color:#0ea5e9}
/* Globe */
#globe{flex:1;display:none;position:relative;background:#000}
#globe canvas{display:block}
#globe-hint{position:fixed;bottom:20px;left:calc(50% + 130px);transform:translateX(-50%);background:rgba(15,23,42,.8);color:#94a3b8;font-size:11px;padding:6px 12px;border-radius:99px;pointer-events:none;z-index:1100;display:none}
#globe-legend{position:fixed;bottom:20px;right:20px;background:rgba(15,23,42,.9);border:1px solid #334155;border-radius:8px;padding:8px 10px;font-size:10px;color:#cbd5e1;max-width:130px;z-index:1100;display:none}

body.is-3d #globe-hint, body.is-3d #globe-legend{display:block}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(14,165,233,.7)}70%{box-shadow:0 0 0 12px rgba(14,165,233,0)}}
@keyframes sharkpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ─── Mobile / responsive ─────────────────────────────────────────────── */
@media (max-width: 720px) {
  header { padding: 10px 12px; }
  header h1 { font-size: 14px; }
  header p { display: none; }
  #view-toggle { padding: 6px 10px; font-size: 11px; }

  #layout { flex-direction: column; position: relative; }
  #map, #globe { width: 100%; height: 100%; }

  /* Sidebar becomes a bottom sheet that slides up */
  #sidebar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    width: 100%; min-width: 0;
    height: 60vh;
    border-right: none;
    border-top: 1px solid #1e293b;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.6);
    transform: translateY(calc(100% - 96px)); /* peek: handle + search visible */
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 1300;
  }
  #sidebar.open { transform: translateY(0); }

  /* The whole top strip (handle + search) is the drag/tap target */
  #sheet-handle {
    display: block;
    padding: 10px 0 6px;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
  }
  #sheet-handle::before {
    content: '';
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 42px; height: 5px;
    background: #475569;
    border-radius: 99px;
  }
  #sheet-handle::after {
    content: 'Tap to browse animals';
    display: block;
    text-align: center;
    font-size: 10px;
    color: #475569;
    margin-top: 14px;
  }
  #sidebar.open #sheet-handle::after { content: 'Tap to close'; }

  /* When open, search + filters + list show normally */
  #search-wrap { padding-top: 4px; }

  /* Detail panel as full-width bottom sheet, above the list sheet */
  #detail {
    position: fixed;
    top: auto; bottom: 0; left: 0; right: 0;
    width: 100%;
    max-height: 72vh;
    border-radius: 16px 16px 0 0;
    padding: 16px;
    z-index: 1400;
  }
  #detail h3 { font-size: 16px; }
  .dr { font-size: 13px; }

  #play-btn, #reset-btn { padding: 10px; font-size: 14px; }
  #progress, #speed { height: 24px; }

  /* Move legends up and shrink so they don't sit under the sheet peek */
  .species-legend, #globe-legend {
    font-size: 9px;
    transform: scale(.8);
    transform-origin: bottom right;
    bottom: 104px !important;
  }
  .sst-legend { transform: scale(.8); transform-origin: bottom left; bottom: 104px !important; }
  #globe-legend { bottom: 104px; }
  #globe-hint { bottom: 104px; }

  #sotd-img { height: 56px; }

  .leaflet-control-zoom a { width: 34px !important; height: 34px !important; line-height: 34px !important; font-size: 18px !important; }
  /* Keep zoom controls clear of the bottom sheet */
  .leaflet-bottom { margin-bottom: 96px; }
}

/* Hide the mobile sheet handle on desktop */
#sheet-handle { display: none; }

</style>
</head>
<body>
<header>
  <span style="font-size:20px">🦈</span>
  <div style="flex:1">
    <h1>Shark Tracker <span class="live">Live</span></h1>
    <p>Powered by OCEARCH · click any animal to explore its journey</p>
  </div>
  <button id="view-toggle" onclick="toggleView()">🌐 3D Globe</button>
</header>
<div id="layout">
  <div id="sidebar">
    <div id="sheet-handle" onclick="toggleSheet()"></div>
    <div id="search-wrap"><input id="srch" placeholder="Search animals…" oninput="render()"></div>
    <div id="sotd" onclick="openSotd()" style="display:none">
      <img id="sotd-img" alt="">
      <div id="sotd-label">⭐ Shark of the Day</div>
      <div id="sotd-body">
        <div id="sotd-emoji">🦈</div>
        <div id="sotd-info">
          <div id="sotd-name"></div>
          <div id="sotd-meta"></div>
          <div id="sotd-ping"></div>
        </div>
      </div>
    </div>
    <div id="filters">
      <button class="pill on" onclick="setF('all',this)">All</button>
      <button class="pill" onclick="setF('Sharks',this)">Sharks</button>
      <button class="pill" onclick="setF('Turtles',this)">Turtles</button>
      <button class="pill" onclick="setF('White Shark',this)">White</button>
      <button class="pill" onclick="setF('Tiger',this)">Tiger</button>
    </div>
    <div id="count"></div>
    <div id="list"></div>
  </div>
  <div id="map"></div>
  <div id="globe"></div>
  <div id="globe-hint">drag to rotate · scroll to zoom</div>
  <div id="globe-legend"></div>
</div>

<div id="detail">
  <button id="close-btn" onclick="closeDetail()" title="Close">✕</button>
  <h3 id="d-name"></h3>
  <div class="dr"><span class="dl">Species</span><span class="dv" id="d-sp"></span></div>
  <div class="dr"><span class="dl">Sex</span><span class="dv" id="d-sx"></span></div>
  <div class="dr"><span class="dl">Length</span><span class="dv" id="d-ln"></span></div>
  <div class="dr"><span class="dl">Weight</span><span class="dv" id="d-wt"></span></div>
  <div class="dr"><span class="dl">Last ping</span><span class="dv" id="d-lp"></span></div>
  <div id="trail-status"></div>

  <div id="playback">
    <div id="playback-btns">
      <button id="play-btn" onclick="togglePlay()">▶ Play</button>
      <button id="reset-btn" onclick="resetAnimation()">↺</button>
    </div>
    <div id="speed-wrap">
      <label>Speed</label>
      <input type="range" id="speed" min="1" max="10" value="5">
    </div>
    <div id="progress-wrap">
      <label>Ping</label>
      <input type="range" id="progress" min="0" value="0" step="1">
    </div>
    <div id="ping-info"></div>
  </div>

  <img id="d-img" alt="">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>

}

    maxZoom: 13,

    tileSize: 256,

// ── State ──────────────────────────────────────────────────────────────────
let sel = null, filt = 'all';
let markers = {};
let trailLayers = [];

// Animation state
let animPings = [];       // full ping list [{lat,lon,dt}]
let animProgressInit = 0; // (animProgress declared below)
let animTimer = null;     // setInterval handle
let animPlaying = false;
let animSharkMarker = null;

// ── Helpers ────────────────────────────────────────────────────────────────
const pingAge = d => { if(!d) return 'old'; const h=(Date.now()-new Date(d))/36e5; return h<24?'recent':h<168?'week':'old'; };
const dotColor = a => ({recent:'#10b981',week:'#f59e0b',old:'#64748b'}[a]);

// Species → distinctive color
const speciesColor = sp => {
  sp = (sp || '').toLowerCase();
  if(sp.includes('white')) return '#3b82f6';        // blue
  if(sp.includes('tiger')) return '#f59e0b';         // amber
  if(sp.includes('hammerhead')||sp.includes('sphyrna')) return '#ec4899'; // pink
  if(sp.includes('mako')) return '#a855f7';          // purple
  if(sp.includes('bull')) return '#ef4444';          // red
  if(sp.includes('dusky')) return '#f97316';         // orange
  if(sp.includes('blue shark')||sp.includes('prionace')) return '#06b6d4'; // cyan
  if(sp.includes('blacktip')) return '#64748b';      // slate
  if(sp.includes('whale shark')||sp.includes('rhincodon')) return '#14b8a6'; // teal
  if(sp.includes('turtle')||sp.includes('caretta')||sp.includes('leather')||sp.includes('ridley')||sp.includes('chelonia')) return '#84cc16'; // lime
  if(sp.includes('dolphin')) return '#8b5cf6';       // violet
  if(sp.includes('seal')) return '#a3a3a3';          // gray
  if(sp.includes('sword')) return '#0ea5e9';         // sky
  return '#94a3b8';
};
// Ring color shows ping freshness
const ageRing = a => ({recent:'#10b981',week:'#f59e0b',old:'rgba(255,255,255,.3)'}[a]);
const emo = sp => { sp=(sp||'').toLowerCase(); if(sp.includes('turtle')||sp.includes('caretta')||sp.includes('leather')||sp.includes('ridley')) return '🐢'; if(sp.includes('whale shark')||sp.includes('rhincodon')) return '🐋'; return '🦈'; };
const fmtDate = s => { const d=new Date(s); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };

function visible() {
  const q = document.getElementById('srch').value.toLowerCase();
  return ANIMALS.features.filter(f => {
    const cat = f.properties.category_name?.en || '';
    const sp = f.properties.species || '';
    const nm = (f.properties.name || '').toLowerCase();
    if(filt==='Sharks' && cat!=='Sharks') return false;
    if(filt==='Turtles' && cat!=='Turtles') return false;
    if(filt!=='all' && filt!=='Sharks' && filt!=='Turtles' && !sp.includes(filt)) return false;
    if(q && !nm.includes(q) && !sp.toLowerCase().includes(q)) return false;
    return true;
  });
}
function setF(f, btn) {
  filt = f;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

// ── Clear everything ────────────────────────────────────────────────────────
function clearTrail() {
  stopAnimation();
  trailLayers.forEach(l => { try { map.removeLayer(l); } catch(e){} });
  trailLayers = [];
  if(animSharkMarker) { try { map.removeLayer(animSharkMarker); } catch(e){} animSharkMarker = null; }
  animPings = [];
  animProgress = 0;
  // Clear globe rings if present
  if(globe) { try { globe.ringsData([]); } catch(e){} }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const vis = visible();
  document.getElementById('count').textContent = vis.length + ' of ' + ANIMALS.features.length + ' animals';

  document.getElementById('list').innerHTML = vis.map(f => {
    const p = f.properties;
    const age = pingAge(p.zping_datetime || p.last_move_datetime);
    const isSel = sel && sel.properties.id === p.id;
    return '<div class="row' + (isSel?' sel':'') + '" onclick="selectAnimal(' + p.id + ')">' +
      '<div class="av" style="background:' + speciesColor(p.species) + '33">' + emo(p.species) + '</div>' +
      '<div class="ri"><div class="rn">' + p.name + '</div><div class="rs">' + (p.species||'Unknown') + '</div></div>' +
      '<div class="dot" style="background:' + dotColor(age) + '" title="ping age"></div></div>';
  }).join('');

  // Clear existing markers from the cluster group
  clusterGroup.clearLayers();
  markers = {};

  vis.forEach(f => {
    const p = f.properties;
    const [lon, lat] = f.geometry.coordinates;
    const age = pingAge(p.zping_datetime || p.last_move_datetime);
    const spCol = speciesColor(p.species);
    const ring = ageRing(age);
    const isSel = sel && sel.properties.id === p.id;
    const size = isSel ? 38 : 28;

    // Species color fill + ping-age colored ring
    const icon = L.divIcon({
      className: '',
      html: '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + spCol +
            ';border:' + (isSel ? '3px solid #fff' : '3px solid ' + ring) +
            ';display:flex;align-items:center;justify-content:center;font-size:' + (isSel?18:13) +
            'px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.45)' +
            (isSel ? ';outline:3px solid #0ea5e9;outline-offset:1px' : '') + '">' + emo(p.species) + '</div>',
      iconSize: [size, size],
      iconAnchor: [size/2, size/2],
    });

    const marker = L.marker([lat, lon], { icon, zIndexOffset: isSel?1000:0 })
      .on('click', e => { L.DomEvent.stopPropagation(e); selectAnimal(p.id); });

    markers[p.id] = marker;
    clusterGroup.addLayer(marker);
  });

  if(is3D && globe) updateGlobeData();
}

// ── Select animal ──────────────────────────────────────────────────────────
function selectAnimal(id) {
  sel = ANIMALS.features.find(f => f.properties.id === id) || null;
  if(!sel) return;
  // On mobile, collapse the bottom sheet so the map is visible
  if (window.innerWidth <= 720) document.getElementById('sidebar').classList.remove('open');
  const p = sel.properties;

  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-sp').textContent = p.species || '—';
  document.getElementById('d-sx').textContent = p.gender || '—';
  document.getElementById('d-ln').textContent = p.length || '—';
  document.getElementById('d-wt').textContent = p.weight || '—';
  const lp = p.zping_datetime || p.last_move_datetime;
  document.getElementById('d-lp').textContent = lp ? fmtDate(lp) : '—';
  const img = document.getElementById('d-img');
  if(p.image){img.src=p.image;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('detail').style.display = 'block';

  clearTrail();

  const t = TRAILS[id];
  if(t && t.motion && t.motion.length > 0) {
    // Parse pings
    animPings = t.motion.map(m => ({
      lat: m.point.coordinates[1],
      lon: m.point.coordinates[0],
      dt: m.dt_move,
    }));
    const km = t.log && t.log.total ? ' · ' + Math.round(t.log.total/1000).toLocaleString() + ' km' : '';
    document.getElementById('trail-status').textContent = '✅ ' + animPings.length + ' pings' + km;

    // Set up playback UI
    const prog = document.getElementById('progress');
    prog.max = animPings.length - 1;
    prog.value = animPings.length - 1;
    prog.oninput = () => { stopAnimation(); seekTo(parseInt(prog.value)); };
    document.getElementById('playback').style.display = 'block';
    document.getElementById('play-btn').disabled = false;

    // Draw full static trail first
    drawFullTrail();

    // Fit map
    const bounds = L.latLngBounds(animPings.map(p => [p.lat, p.lon]));
    map.fitBounds(bounds.pad(0.15));
  } else {
    document.getElementById('trail-status').textContent = 'No trail — run npm run scrape to fetch it.';
    document.getElementById('playback').style.display = 'none';
    const [lon, lat] = sel.geometry.coordinates;
    if(!is3D) map.panTo([lat, lon], { animate: true });
  }

  render();

  // Globe sync
  if(is3D && globe) {
    updateGlobeData();
    const [lon, lat] = sel.geometry.coordinates;
    globe.pointOfView({ lat, lng: lon, altitude: 1.5 }, 1000);
  }
}

function closeDetail() {
  sel = null;
  clearTrail();
  document.getElementById('detail').style.display = 'none';
  document.getElementById('playback').style.display = 'none';
  render();
  if(is3D && globe) updateGlobeData();
}

// ── Draw full static trail ──────────────────────────────────────────────────
function drawFullTrail() {
  // Remove old trail layers (but not the shark marker)
  trailLayers.forEach(l => { try { map.removeLayer(l); } catch(e){} });
  trailLayers = [];
  if(animSharkMarker) { try { map.removeLayer(animSharkMarker); } catch(e){} animSharkMarker = null; }

  if(!animPings.length) return;
  const col = dotColor(pingAge(sel.properties.zping_datetime || sel.properties.last_move_datetime));
  const n = animPings.length;

  // Fading trail segments
  for(let i = 1; i < n; i++) {
    const opacity = 0.1 + 0.85 * (i / n);
    const seg = L.polyline(
      [[animPings[i-1].lat, animPings[i-1].lon], [animPings[i].lat, animPings[i].lon]],
      { color: col, weight: 2.5, opacity }
    ).addTo(map);
    trailLayers.push(seg);
  }

  // Start dot (first ping) — green circle with "Start" label
  const startDot = L.circleMarker([animPings[0].lat, animPings[0].lon], {
    radius: 6, color: 'white', weight: 2, fillColor: '#22c55e', fillOpacity: 1,
  }).addTo(map).bindTooltip('Start · ' + fmtDate(animPings[0].dt), { permanent: false, direction: 'top' });
  trailLayers.push(startDot);

  // Intermediate ping dots
  for(let i = 1; i < n - 1; i++) {
    const dot = L.circleMarker([animPings[i].lat, animPings[i].lon], {
      radius: 2.5, color: col, fillColor: col, fillOpacity: 0.4, weight: 0
    }).addTo(map).bindTooltip(fmtDate(animPings[i].dt), { direction: 'top' });
    trailLayers.push(dot);
  }

  // Current position — pulsing
  const last = animPings[n - 1];
  const pulseIcon = L.divIcon({
    className: '',
    html: '<div style="width:16px;height:16px;border-radius:50%;background:' + col + ';border:2.5px solid white;animation:pulse 1.5s infinite"></div>',
    iconSize: [16, 16], iconAnchor: [8, 8],
  });
  const pulseDot = L.marker([last.lat, last.lon], { icon: pulseIcon, zIndexOffset: 2000 })
    .addTo(map).bindTooltip('Now · ' + fmtDate(last.dt), { direction: 'top' });
  trailLayers.push(pulseDot);

  updatePingInfo(n - 1);
}

// ── Animation ──────────────────────────────────────────────────────────────
// Smooth animation using requestAnimationFrame + interpolation
let animProgress = 0;      // continuous 0..(N-1), fractional between pings
let animRAF = null;        // requestAnimationFrame handle
let animLastTs = 0;

function togglePlay() {
  if(animPlaying) { stopAnimation(); }
  else { startAnimation(); }
}

function startAnimation() {
  if(!animPings.length) return;
  // If at end, restart
  if(animProgress >= animPings.length - 1) { animProgress = 0; }
  animPlaying = true;
  document.getElementById('play-btn').textContent = '⏸ Pause';
  animLastTs = performance.now();
  animRAF = requestAnimationFrame(animStep);
}

function animStep(ts) {
  if(!animPlaying) return;
  const dt = (ts - animLastTs) / 1000; // seconds since last frame
  animLastTs = ts;

  // Speed slider 1..10 → pings per second 0.7 .. 12
  const speed = parseInt(document.getElementById('speed').value);
  const pingsPerSec = 0.5 + speed * 1.2;

  animProgress += dt * pingsPerSec;

  if(animProgress >= animPings.length - 1) {
    animProgress = animPings.length - 1;
    drawSmoothFrame(animProgress);
    stopAnimation();
    document.getElementById('play-btn').textContent = '▶ Replay';
    return;
  }

  document.getElementById('progress').value = Math.round(animProgress);
  drawSmoothFrame(animProgress);
  animRAF = requestAnimationFrame(animStep);
}

function stopAnimation() {
  if(animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }
  animPlaying = false;
  document.getElementById('play-btn').textContent = '▶ Play';
}

function resetAnimation() {
  stopAnimation();
  animProgress = 0;
  document.getElementById('progress').value = 0;
  document.getElementById('play-btn').textContent = '▶ Play';
  drawSmoothFrame(0);
}

function seekTo(frame) {
  animProgress = frame;
  drawSmoothFrame(frame);
}

// Linear interpolate between two [lat,lon]
function lerpLatLon(a, b, t) {
  return [a.lat + (b.lat - a.lat) * t, a.lon + (b.lon - a.lon) * t];
}

let animTrailLine = null; // single growing polyline (more efficient than many segments)

function drawSmoothFrame(prog) {
  // prog is fractional: integer part = last passed ping, fraction = progress to next
  const idx = Math.floor(prog);
  const frac = prog - idx;

  // Clear dynamic layers
  trailLayers.forEach(l => { try { map.removeLayer(l); } catch(e){} });
  trailLayers = [];
  if(animSharkMarker) { try { map.removeLayer(animSharkMarker); } catch(e){} animSharkMarker = null; }

  if(!animPings.length) return;
  const col = dotColor(pingAge(sel.properties.zping_datetime || sel.properties.last_move_datetime));

  // Build the path coordinates up to current interpolated position
  const pathCoords = [];
  for(let i = 0; i <= idx; i++) pathCoords.push([animPings[i].lat, animPings[i].lon]);

  // Current interpolated position
  let curPos;
  if(idx < animPings.length - 1 && frac > 0) {
    curPos = lerpLatLon(animPings[idx], animPings[idx+1], frac);
    pathCoords.push(curPos);
  } else {
    curPos = [animPings[idx].lat, animPings[idx].lon];
  }

  // Draw the trail as a single smooth polyline
  if(pathCoords.length > 1) {
    const line = L.polyline(pathCoords, { color: col, weight: 3, opacity: 0.85, lineJoin: 'round', lineCap: 'round' }).addTo(map);
    trailLayers.push(line);
  }

  // Start marker (green)
  const startDot = L.circleMarker([animPings[0].lat, animPings[0].lon], {
    radius: 6, color: 'white', weight: 2, fillColor: '#22c55e', fillOpacity: 1,
  }).addTo(map).bindTooltip('Start · ' + fmtDate(animPings[0].dt), { permanent: false });
  trailLayers.push(startDot);

  // Moving shark marker at interpolated position
  const sharkIcon = L.divIcon({
    className: '',
    html: '<div style="font-size:22px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))">' + emo(sel.properties.species) + '</div>',
    iconSize: [28, 28], iconAnchor: [14, 14],
  });
  animSharkMarker = L.marker(curPos, { icon: sharkIcon, zIndexOffset: 3000 }).addTo(map);

  updatePingInfo(idx);

  // Sync the globe shark position if in 3D
  if(is3D && globe) updateGlobeAnimPosition(curPos, pathCoords);
}

function updatePingInfo(frame) {
  if(!animPings.length) return;
  const p = animPings[frame];
  document.getElementById('ping-info').textContent =
    fmtDate(p.dt) + ' · ping ' + (frame + 1) + '/' + animPings.length;
}


// ── Shark of the Day ───────────────────────────────────────────────────────
let sotdAnimal = null;
function pickSharkOfDay() {
  // Pool: all animals that have trail data (so the feature shows a real journey)
  const withTrails = ANIMALS.features.filter(f => {
    const t = TRAILS[f.properties.id];
    return t && t.motion && t.motion.length > 1;
  });
  const pool = withTrails.length > 0 ? withTrails : ANIMALS.features.slice();

  // Sort by id for a stable, consistent ordering (independent of file order)
  pool.sort((a, b) => a.properties.id - b.properties.id);

  // Build a seed from today's calendar date (local time): YYYYMMDD
  const now = new Date();
  const dateKey = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();

  // Hash the date so consecutive days jump around the pool instead of
  // stepping by one (feels more like a genuine "pick of the day")
  let h = dateKey;
  h = (h ^ 61) ^ (h >>> 16);
  h = h + (h << 3);
  h = h ^ (h >>> 4);
  h = Math.abs(h * 0x27d4eb2d);
  const idx = h % pool.length;

  sotdAnimal = pool[idx];

  if(!sotdAnimal) return;
  const p = sotdAnimal.properties;
  const el = document.getElementById('sotd');
  el.style.display = 'block';
  document.getElementById('sotd-emoji').textContent = emo(p.species);
  document.getElementById('sotd-name').textContent = p.name;
  document.getElementById('sotd-meta').textContent = (p.species || '').replace(/\s*\(.*\)/, '');
  const lp = p.zping_datetime || p.last_move_datetime;
  document.getElementById('sotd-ping').textContent = lp ? '📍 Last pinged ' + fmtDate(lp) : '';
  const img = document.getElementById('sotd-img');
  if(p.image){ img.src = p.image; img.style.display = 'block'; } else { img.style.display = 'none'; }
}

function openSotd() {
  if(sotdAnimal) selectAnimal(sotdAnimal.properties.id);
}


// ── Mobile bottom-sheet behavior ───────────────────────────────────────────
function toggleSheet() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Swipe up/down on the handle area to open/close the sheet
(function() {
  const handle = document.getElementById('sheet-handle');
  if (!handle) return;
  let startY = null;
  handle.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  handle.addEventListener('touchend', e => {
    if (startY === null) return;
    const dy = e.changedTouches[0].clientY - startY;
    const sb = document.getElementById('sidebar');
    if (dy < -25) sb.classList.add('open');       // swiped up
    else if (dy > 25) sb.classList.remove('open'); // swiped down
    startY = null;
  }, { passive: true });
})();

// Tapping the search box opens the sheet (and doesn't fight the keyboard)
document.getElementById('srch').addEventListener('focus', () => {
  if (window.innerWidth <= 720) document.getElementById('sidebar').classList.add('open');
});

pickSharkOfDay();


// ── 3D Globe view ───────────────────────────────────────────────────────────
let globe = null;
let is3D = false;

function initGlobe() {
  if(globe) return;
  const el = document.getElementById('globe');
  const w = el.offsetWidth || window.innerWidth - 260;
  const h = el.offsetHeight || window.innerHeight - 60;
  globe = Globe()
    .width(w)
    .height(h)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundColor('#000010')
    .showAtmosphere(true)
    .atmosphereColor('#0ea5e9')
    .atmosphereAltitude(0.18)
    .pointOfView({ lat: 30, lng: -55, altitude: 2.2 })
    (el);

  // Auto-rotate slowly
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.4;
  // Stop auto-rotate on user interaction
  globe.controls().addEventListener('start', () => { globe.controls().autoRotate = false; });

  // Fill the species legend in 3D too
  const items = [
    ['White Shark', '#3b82f6'], ['Tiger', '#f59e0b'], ['Hammerhead', '#ec4899'],
    ['Mako', '#a855f7'], ['Bull', '#ef4444'], ['Whale Shark', '#14b8a6'],
    ['Blue Shark', '#06b6d4'], ['Turtle', '#84cc16'],
  ];
  document.getElementById('globe-legend').innerHTML =
    '<div style="font-weight:600;margin-bottom:5px">Species</div>' +
    items.map(([n,c]) => '<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px"><span style="width:9px;height:9px;border-radius:50%;background:' + c + ';display:inline-block;flex-shrink:0"></span>' + n + '</div>').join('');

  updateGlobeData();
}

// Live-update the moving shark + growing trail on the globe during playback
function updateGlobeAnimPosition(curPos, pathCoords) {
  if(!globe || !sel) return;
  const col = dotColor(pingAge(sel.properties.zping_datetime || sel.properties.last_move_datetime));
  // Growing trail path
  globe
    .pathsData([{ coords: pathCoords, color: col }])
    .pathPoints('coords')
    .pathPointLat(c => c[0])
    .pathPointLng(c => c[1])
    .pathColor(d => d.color)
    .pathStroke(3)
    .pathTransitionDuration(0);
  // Moving shark as a ring/point at current position
  globe
    .ringsData([{ lat: curPos[0], lng: curPos[1] }])
    .ringLat('lat').ringLng('lng')
    .ringColor(() => col)
    .ringMaxRadius(2.5)
    .ringPropagationSpeed(2)
    .ringRepeatPeriod(700);
}

function updateGlobeData() {
  if(!globe) return;
  const vis = visible();

  // Animal points
  const points = vis.map(f => {
    const p = f.properties;
    const [lon, lat] = f.geometry.coordinates;
    const age = pingAge(p.zping_datetime || p.last_move_datetime);
    const isSel = sel && sel.properties.id === p.id;
    return {
      lat, lng: lon,
      size: isSel ? 0.6 : 0.3,
      color: isSel ? '#0ea5e9' : speciesColor(p.species),
      id: p.id,
      name: p.name,
    };
  });

  globe
    .pointsData(points)
    .pointLat('lat').pointLng('lng')
    .pointColor('color')
    .pointAltitude(0.01)
    .pointRadius('size')
    .pointLabel(d => '<div style="background:#0f172a;color:white;padding:4px 8px;border-radius:6px;font-size:12px;font-family:sans-serif;border:1px solid #334155">' + emo(vis.find(f=>f.properties.id===d.id)?.properties.species) + ' ' + d.name + '</div>')
    .onPointClick(d => selectAnimal(d.id));

  // Selected trail as a path
  if(sel && TRAILS[sel.properties.id]?.motion?.length) {
    const t = TRAILS[sel.properties.id];
    const col = dotColor(pingAge(sel.properties.zping_datetime || sel.properties.last_move_datetime));
    const pathData = [{
      coords: t.motion.map(m => [m.point.coordinates[1], m.point.coordinates[0]]),
      color: col,
    }];
    globe
      .pathsData(pathData)
      .pathPoints('coords')
      .pathPointLat(c => c[0])
      .pathPointLng(c => c[1])
      .pathColor(d => d.color)
      .pathStroke(2.5)
      .pathDashLength(0.01)
      .pathDashGap(0.004)
      .pathDashAnimateTime(20000)
      .pathTransitionDuration(0);
  } else {
    globe.pathsData([]);
  }
}

let sstWasOn = false;

function toggleView() {
  is3D = !is3D;
  const btn = document.getElementById('view-toggle');
  if(is3D) {
    // Remember if SST overlay was on, then remove it so it doesn't
    // fight the WebGL globe for GPU memory (this was crashing Chrome)
    sstWasOn = map.hasLayer(sstLayer);
    if(sstWasOn) { map.removeLayer(sstLayer); sstLegend.remove(); }

    document.getElementById('map').style.display = 'none';
    document.getElementById('globe').style.display = 'block';
    document.body.classList.add('is-3d');
    btn.textContent = '🗺 2D Map';

    // Initialize globe after the map has fully released its tiles
    setTimeout(() => {
      initGlobe();
      const el = document.getElementById('globe');
      globe.width(el.offsetWidth).height(el.offsetHeight);
      updateGlobeData();
    }, 100);
  } else {
    document.getElementById('globe').style.display = 'none';
    document.getElementById('map').style.display = 'block';
    document.body.classList.remove('is-3d');
    btn.textContent = '🌐 3D Globe';
    map.invalidateSize();

    // Restore SST overlay if it was on before
    if(sstWasOn) { sstLayer.addTo(map); sstLegend.addTo(map); }
  }
}

// Resize globe on window resize
window.addEventListener('resize', () => {
  if(is3D && globe) {
    const el = document.getElementById('globe');
    globe.width(el.offsetWidth).height(el.offsetHeight);
  }
});


render();
</script>
