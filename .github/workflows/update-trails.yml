name: Update shark trails

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright's Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Find Asia/Pacific-region animals and add them
        run: node find-pacific.js
        env:
          CI: 'true'

      - name: Scrape trails and bake into index.html
        run: npm run scrape
        env:
          CI: 'true'

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html trails.json scrape.js pacific-animals.json 2>/dev/null || git add index.html trails.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update shark trails ($(date -u +%Y-%m-%d))"
            git push
          fi
